apiVersion: tekton.dev/v1
kind: PipelineRun
#test1
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/red-hat-data-services/rhods-operator?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/cancel-in-progress: "false"
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    build.appstudio.openshift.io/build-nudge-files: "bundle/bundle-patch.yaml"
    # Skip trigger when only these files/folders change:
    #   bundle/, build/, .tekton/, .github/workflows/, Dockerfiles/bundle.Dockerfile
    # Exception: always trigger for:
    #   build/operands-map.yaml, .tekton/odh-operator-v3-5-ea-2-push.yaml
    pipelinesascode.tekton.dev/on-cel-expression: |
      event == "push"
      && target_branch == "rhoai-3.5-ea.2"
      && ( files.all.exists(p, !(
        p.matches('^bundle/') || p.matches('^build/') || p.matches('^\\.tekton/')
          || p.matches('^\\.github/workflows/')
          || p.matches('^Dockerfiles/bundle\\.Dockerfile$')
      ) || "build/operands-map.yaml".pathChanged() || ".tekton/odh-operator-v3-5-ea-2-push.yaml".pathChanged()) )
  labels:
    appstudio.openshift.io/application: rhoai-v3-5-ea-2
    appstudio.openshift.io/component: odh-operator-v3-5-ea-2
    pipelines.appstudio.openshift.io/type: build
  name: odh-operator-v3-5-ea-2-on-push
  namespace: rhoai-tenant
spec:
  timeouts:
    pipeline: 4h
  params:
  - name: git-url
    value: '{{source_url}}'
  - name: revision
    value: '{{revision}}'
  - name: additional-tags
    value:
    - '{{target_branch}}-{{revision}}'
  - name: output-image
    value: quay.io/rhoai/odh-rhel9-operator:{{target_branch}}
  - name: rhoai-version
    value: "3.5.0-ea.2"
  - name: dockerfile
    value: Dockerfiles/Dockerfile.konflux
  - name: path-context
    value: .
  - name: hermetic
    value: true
  - name: prefetch-input
    value: |
      [
        {
          "type": "gomod",
          "path": "."
        },
        {
          "type": "rpm",
          "path": "."
        }
      ]
  - name: build-source-image
    value: true
  - name: build-image-index
    value: true
  - name: build-platforms
    value:
    - linux/x86_64
    - linux/ppc64le
    - linux/s390x
    - linux-m2xlarge/arm64
  pipelineRef:
    resolver: git
    params:
    - name: url
      value: https://github.com/red-hat-data-services/konflux-central.git
    - name: revision
      value: '{{ target_branch }}'
    - name: pathInRepo
      value: pipelines/multi-arch-container-build.yaml
  taskRunTemplate:
    serviceAccountName: build-pipeline-odh-operator-v3-5-ea-2
  workspaces:
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
status: {}
