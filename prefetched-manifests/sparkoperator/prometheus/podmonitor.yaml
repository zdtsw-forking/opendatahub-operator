apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: spark-operator-metrics-monitor
  namespace: system
  labels: {}
spec:
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      scheme: http
  selector:
    matchLabels:
      app.kubernetes.io/name: spark-operator
      app.kubernetes.io/component: controller
