# Example VariantAutoscaling for HPA/KEDA integration.
# This references a Deployment named "sample-deployment" which you must provide separately.
# For a ready-to-apply full example (deployment + service + servicemonitor + va + hpa),
# see config/samples/simulator/ instead.
apiVersion: llmd.ai/v1alpha1
kind: VariantAutoscaling
metadata:
  name: sample-deployment
  namespace: llm-d-sim
  labels:
    inference.optimization/acceleratorName: A100
spec:
  scaleTargetRef:
    kind: Deployment
    name: sample-deployment
  modelID: default/default
