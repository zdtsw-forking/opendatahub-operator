apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: model-b-hpa
  namespace: llm-d-sim
  annotations:
    llm-d.ai/managed: "true"
    llm-d.ai/model-id: "model-b"
    # llm-d.ai/epp-inference-pool intentionally absent — Coordinator skips HPAs
    # without this annotation. The rebalance overlay adds it back.
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: model-b-decode
  minReplicas: 1
  maxReplicas: 10
  metrics:
  - type: External
    external:
      metric:
        name: model_b_epp_queue_size
      target:
        type: Value
        value: "1"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Pods
        value: 4
        periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
