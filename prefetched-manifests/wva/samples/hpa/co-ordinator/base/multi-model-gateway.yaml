apiVersion: v1
kind: ConfigMap
metadata:
  name: multi-model-gateway-config
  namespace: llm-d-sim
data:
  nginx.conf: |
    events { worker_connections 1024; }
    http {
      resolver kube-dns.kube-system.svc.cluster.local valid=10s ipv6=off;

      server {
        listen 9002;

        location /model-a/ {
          set $upstream_a "model-a-epp.llm-d-sim.svc.cluster.local";
          rewrite ^/model-a(/.*)$ $1 break;
          proxy_pass http://$upstream_a:80;
          proxy_http_version 1.1;
          proxy_set_header Connection "";
          proxy_set_header Host $host;
          proxy_read_timeout 300s;
          proxy_connect_timeout 30s;
          proxy_send_timeout 300s;
        }

        location /model-b/ {
          set $upstream_b "model-b-epp.llm-d-sim.svc.cluster.local";
          rewrite ^/model-b(/.*)$ $1 break;
          proxy_pass http://$upstream_b:80;
          proxy_http_version 1.1;
          proxy_set_header Connection "";
          proxy_set_header Host $host;
          proxy_read_timeout 300s;
          proxy_connect_timeout 30s;
          proxy_send_timeout 300s;
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: multi-model-gateway
  namespace: llm-d-sim
spec:
  replicas: 1
  selector:
    matchLabels:
      app: multi-model-gateway
  template:
    metadata:
      labels:
        app: multi-model-gateway
    spec:
      containers:
      - name: nginx
        image: nginx:1.25-alpine
        imagePullPolicy: IfNotPresent
        args:
        - nginx
        - -c
        - /etc/nginx/nginx.conf
        - -g
        - daemon off;
        ports:
        - containerPort: 9002
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        volumeMounts:
        - name: config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
      volumes:
      - name: config
        configMap:
          name: multi-model-gateway-config
---
apiVersion: v1
kind: Service
metadata:
  name: multi-model-gateway
  namespace: llm-d-sim
spec:
  selector:
    app: multi-model-gateway
  ports:
  - name: http
    port: 9002
    targetPort: 9002
