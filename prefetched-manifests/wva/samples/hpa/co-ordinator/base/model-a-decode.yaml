apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-a-decode
  namespace: llm-d-sim
spec:
  replicas: 1
  selector:
    matchLabels:
      app: model-a-decode
  template:
    metadata:
      labels:
        app: model-a-decode
        llm-d.ai/model-id: model-a
        llm-d.ai/inference-serving: "true"
        llm-d.ai/managed: "true"
    spec:
      containers:
      - name: model-a-decode
        image: ghcr.io/llm-d/llm-d-inference-sim:v0.9.0
        imagePullPolicy: IfNotPresent
        args:
        - --model
        - model-a
        - --port
        - "8000"
        - --time-to-first-token=2000ms
        - --inter-token-latency=100ms
        - --mode=random
        - --enable-kvcache
        - --kv-cache-size=20
        - --block-size=8
        - --max-num-seqs
        - "5"
        - --max-model-len
        - "512"
        ports:
        - name: http
          containerPort: 8000
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
            nvidia.com/gpu: "1"
          limits:
            cpu: 500m
            memory: 512Mi
            nvidia.com/gpu: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: model-a-service
  namespace: llm-d-sim
spec:
  selector:
    app: model-a-decode
  ports:
  - name: http
    port: 8000
    targetPort: 8000
