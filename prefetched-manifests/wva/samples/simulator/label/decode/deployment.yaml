apiVersion: apps/v1
kind: Deployment
metadata:
  name: dev-model-decode
  namespace: llm-d-sim
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dev-model-decode
      llm-d.ai/inferenceServing: "true"
      llm-d.ai/model: random
      llm-d.ai/model-pool: optimized-baseline
      llm-d.ai/guide: optimized-baseline
      llm-d.ai/inference-serving: "true"
      llm-d.ai/accelerator-variant: cpu
      llm-d.ai/role: decode
  template:
    metadata:
      labels:
        app: dev-model-decode
        llm-d.ai/inferenceServing: "true"
        llm-d.ai/model: random
        llm-d.ai/model-pool: optimized-baseline
        llm-d.ai/guide: optimized-baseline
        llm-d.ai/inference-serving: "true"
        llm-d.ai/accelerator-variant: cpu
        llm-d.ai/role: decode
        inference.optimization/acceleratorName: NVIDIA-A100-PCIE-80GB
    spec:
      containers:
        - name: dev-model-decode
          image: ghcr.io/llm-d/llm-d-inference-sim:v0.9.0
          imagePullPolicy: IfNotPresent
          args:
            - --model
            - test-model
            - --port
            - "8000"
            - --time-to-first-token=2000ms
            - --inter-token-latency=100ms
            - --mode=random
            - --enable-kvcache
            - --kv-cache-size=1
            - --block-size=8
            - --max-num-seqs
            - "5"
            - --max-model-len
            - "512"
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: status.podIP
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
