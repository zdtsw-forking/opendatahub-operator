apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: wva-system

namePrefix: workload-variant-autoscaler-

resources:
- ../../../base/
# Grant the WVA controller cluster-monitoring-view so it can query Thanos
# Querier with its own SA token.
- manager-cluster-monitoring-view-clusterrolebinding.yaml
# Grant OpenShift's user-workload Prometheus cluster-monitoring-view so it can
# scrape the controller's secure /metrics endpoint.
- prometheus-cluster-monitoring-view-clusterrolebinding.yaml
# Long-lived SA token referenced by the ServiceMonitor's bearerTokenSecret.
- controller-manager-token-secret.yaml
# ODH/RHDS: allow ingress to the WVA controller pods in namespaces with
# restrictive default-deny NetworkPolicies (e.g. redhat-ods-applications).
- allow-metrics-traffic.yaml

components:
- ../../../components/namespace-scoped/

configMapGenerator:
- name: wva-parameters
  envs:
  - params.env
generatorOptions:
  disableNameSuffixHash: true

replacements:
- source:
    kind: ConfigMap
    version: v1
    name: wva-parameters
    fieldPath: data.wva-controller-image
  targets:
  - select:
      kind: Deployment
      name: workload-variant-autoscaler-controller-manager
    fieldPaths:
    - spec.template.spec.containers.[name=manager].image

patches:
# Point WVA at the in-cluster Thanos Querier (OpenShift's user-workload-monitoring
# stack) and tighten TLS verification — the Service CA certificate is mounted
# from /var/run/secrets/kubernetes.io/serviceaccount/service-ca.crt by the
# deployment patch below.
- path: configmap-patch.yaml
  target:
    kind: ConfigMap
    name: manager-config
- path: deployment-patch.yaml
  target:
    kind: Deployment
    name: controller-manager
# Grant the WVA controller manager SA read access to its own /metrics endpoint
# so the ServiceMonitor can scrape it.
- patch: |-
    - op: replace
      path: /subjects/0
      value:
        kind: ServiceAccount
        name: controller-manager
  target:
    kind: ClusterRoleBinding
    name: metrics-reader-rolebinding
# Label the WVA namespace so OCP user-workload-monitoring Prometheus discovers
# ServiceMonitors inside it (required for UWM to watch the namespace).
- patch: |-
    - op: add
      path: /metadata/labels/openshift.io~1user-monitoring
      value: "true"
  target:
    kind: Namespace
# Configure the ServiceMonitor to authenticate using the WVA SA token Secret,
# which is granted metrics-reader access via the patch above.
- patch: |-
    - op: add
      path: /spec/endpoints/0/bearerTokenSecret
      value:
        name: controller-manager-token
        key: token
    - op: remove
      path: /spec/endpoints/0/bearerTokenFile
  target:
    kind: ServiceMonitor
    name: controller-manager-metrics-monitor
# ODH/RHDS: skip operator reconcile of the saturation ConfigMap.
- patch: |-
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: saturation-scaling-config
      annotations:
        opendatahub.io/managed: "false"
  target:
    kind: ConfigMap
    name: saturation-scaling-config
