# Grants the WVA controller read access to OpenShift's cluster monitoring stack
# so it can query Thanos Querier (thanos-querier.openshift-monitoring.svc) using
# its own service account token.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: manager-cluster-monitoring-view
  labels:
    app.kubernetes.io/name: workload-variant-autoscaler
    app.kubernetes.io/managed-by: kustomize
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-monitoring-view
subjects:
- kind: ServiceAccount
  name: controller-manager
