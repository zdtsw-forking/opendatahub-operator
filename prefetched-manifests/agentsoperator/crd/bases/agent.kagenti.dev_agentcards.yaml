---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.1
  name: agentcards.agent.kagenti.dev
spec:
  group: agent.kagenti.dev
  names:
    kind: AgentCard
    listKind: AgentCardList
    plural: agentcards
    shortNames:
    - agentcards
    - cards
    singular: agentcard
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: Agent Protocol
      jsonPath: .status.protocol
      name: Protocol
      type: string
    - description: Workload Kind
      jsonPath: .status.targetRef.kind
      name: Kind
      type: string
    - description: Target Workload
      jsonPath: .status.targetRef.name
      name: Target
      type: string
    - description: Agent Name
      jsonPath: .status.card.name
      name: Agent
      type: string
    - description: Identity Verified
      jsonPath: .status.conditions[?(@.type=='Verified')].status
      name: Verified
      type: string
    - description: Identity Bound
      jsonPath: .status.bindingStatus.bound
      name: Bound
      type: boolean
    - description: Sync Status
      jsonPath: .status.conditions[?(@.type=='Synced')].status
      name: Synced
      type: string
    - description: Last Sync Time
      jsonPath: .status.lastSyncTime
      name: LastSync
      type: date
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    - description: Attested Agent SPIFFE ID
      jsonPath: .status.attestedAgentSpiffeId
      name: AttestedAgent
      priority: 1
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          AgentCard binds an A2A agent card to a backing workload. The controller periodically
          fetches the card from the referenced workload, verifies its JWS signature and SPIFFE
          identity against the configured trust domain, and caches the result in status.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AgentCardSpec defines the desired state of AgentCard.
            properties:
              identityBinding:
                description: IdentityBinding specifies SPIFFE identity binding configuration
                properties:
                  strict:
                    default: false
                    description: |-
                      Strict controls whether binding failures trigger enforcement actions
                      (label removal, restrictive NetworkPolicy).
                      When true, binding failure removes the verified label and applies restrictive NetworkPolicy.
                      When false (default), binding results are recorded in status only;
                      the workload retains its verified label and permissive policy.
                    type: boolean
                  trustDomain:
                    description: |-
                      TrustDomain overrides the operator-level --spire-trust-domain for this AgentCard.
                      If empty, the operator flag value is used.
                    pattern: ^[a-zA-Z0-9]([a-zA-Z0-9\-\.]*[a-zA-Z0-9])?$
                    type: string
                type: object
              syncPeriod:
                default: 30s
                description: SyncPeriod is how often to re-fetch the agent card (e.g.,
                  "30s", "5m")
                type: string
              targetRef:
                description: |-
                  TargetRef identifies the workload backing this agent (duck typing).
                  The workload must have the kagenti.io/type=agent label.
                properties:
                  apiVersion:
                    description: APIVersion is the API version of the target resource
                      (e.g., "apps/v1")
                    minLength: 1
                    type: string
                  kind:
                    description: Kind is the kind of the target resource (e.g., "Deployment",
                      "StatefulSet")
                    minLength: 1
                    type: string
                  name:
                    minLength: 1
                    type: string
                required:
                - apiVersion
                - kind
                - name
                type: object
            type: object
          status:
            description: AgentCardStatus defines the observed state of AgentCard.
            properties:
              attestedAgentSpiffeId:
                description: |-
                  AttestedAgentSpiffeID is the SPIFFE ID extracted from the agent's TLS peer certificate
                  during authenticated (mTLS) fetch. Set only when verifiedFetch is enabled and successful.
                type: string
              bindingStatus:
                description: BindingStatus contains the result of identity binding
                  evaluation
                properties:
                  bound:
                    description: Bound indicates whether the verified SPIFFE ID belongs
                      to the configured trust domain
                    type: boolean
                  lastEvaluationTime:
                    description: LastEvaluationTime is when the binding was last evaluated
                    format: date-time
                    type: string
                  message:
                    description: Message is a human-readable description of the binding
                      status
                    type: string
                  reason:
                    description: Reason is a machine-readable reason for the binding
                      status
                    type: string
                required:
                - bound
                type: object
              card:
                description: Card contains the cached agent card data
                properties:
                  capabilities:
                    description: The A2A capability set supported by the agent.
                    properties:
                      extensions:
                        description: A list of protocol extensions supported by the
                          agent.
                        items:
                          description: AgentExtension describes an A2A protocol extension
                            supported by the agent.
                          properties:
                            description:
                              description: A human-readable description of how this
                                agent uses the extension.
                              type: string
                            params:
                              additionalProperties:
                                x-kubernetes-preserve-unknown-fields: true
                              description: Extension-specific configuration parameters.
                              type: object
                            required:
                              description: |-
                                If true, the client must understand and comply with the extension's
                                requirements.
                              type: boolean
                            uri:
                              description: The unique URI identifying the extension.
                              type: string
                          type: object
                        type: array
                      pushNotifications:
                        description: |-
                          Indicates if the agent supports sending push notifications for
                          asynchronous task updates.
                        type: boolean
                      streaming:
                        description: Indicates if the agent supports streaming responses.
                        type: boolean
                    type: object
                  defaultInputModes:
                    description: |-
                      The set of interaction modes that the agent supports across all skills,
                      defined as media types.
                    items:
                      type: string
                    type: array
                  defaultOutputModes:
                    description: The media types supported as outputs from this agent.
                    items:
                      type: string
                    type: array
                  description:
                    description: |-
                      A human-readable description of the agent, assisting users and other
                      agents in understanding its purpose.
                    type: string
                  documentationUrl:
                    description: A URL providing additional documentation about the
                      agent.
                    type: string
                  iconUrl:
                    description: A URL to an icon for the agent.
                    type: string
                  name:
                    description: A human-readable name for the agent.
                    type: string
                  provider:
                    description: The service provider of the agent.
                    properties:
                      organization:
                        description: The name of the agent provider's organization.
                        type: string
                      url:
                        description: A URL for the agent provider's website or relevant
                          documentation.
                        type: string
                    type: object
                  signatures:
                    description: JWS signatures per A2A spec §8.4.2.
                    items:
                      description: AgentCardSignature represents a JWS signature on
                        an AgentCard (A2A spec §8.4.2).
                      properties:
                        header:
                          description: Header contains optional unprotected JWS header
                            parameters.
                          properties:
                            timestamp:
                              description: Timestamp is when the signature was created
                                (ISO 8601 string)
                              type: string
                          type: object
                        protected:
                          description: Protected is the base64url-encoded JWS protected
                            header (contains alg, kid, x5c).
                          type: string
                        signature:
                          description: Signature is the base64url-encoded JWS signature
                            value.
                          type: string
                      required:
                      - protected
                      - signature
                      type: object
                    type: array
                  skills:
                    description: |-
                      Skills represent the abilities of an agent. A skill is a focused set of
                      behaviors that the agent is likely to succeed at.
                    items:
                      description: AgentSkill represents a skill offered by the agent.
                      properties:
                        description:
                          description: A detailed description of the skill.
                          type: string
                        examples:
                          description: Example prompts or scenarios that this skill
                            can handle.
                          items:
                            type: string
                          type: array
                        id:
                          description: A unique identifier for the agent's skill.
                          type: string
                        inputModes:
                          description: |-
                            The set of supported input media types for this skill, overriding the
                            agent's defaults.
                          items:
                            type: string
                          type: array
                        name:
                          description: A human-readable name for the skill.
                          type: string
                        outputModes:
                          description: |-
                            The set of supported output media types for this skill, overriding the
                            agent's defaults.
                          items:
                            type: string
                          type: array
                        parameters:
                          description: The parameters accepted by this skill.
                          items:
                            description: SkillParameter defines a parameter accepted
                              by a skill.
                            properties:
                              default:
                                description: The default value for this parameter.
                                type: string
                              description:
                                description: A human-readable description of the parameter.
                                type: string
                              name:
                                description: The name of the parameter.
                                type: string
                              required:
                                description: Indicates if this parameter must be provided.
                                type: boolean
                              type:
                                description: The type of the parameter (e.g., "string",
                                  "number", "boolean", "object", "array").
                                type: string
                            type: object
                          type: array
                        tags:
                          description: A set of keywords describing the skill's capabilities.
                          items:
                            type: string
                          type: array
                      type: object
                    type: array
                  supportsAuthenticatedExtendedCard:
                    description: |-
                      Indicates if the agent supports providing an extended agent card when
                      authenticated.
                    type: boolean
                  url:
                    description: The URL of the agent's endpoint.
                    type: string
                  version:
                    description: The version of the agent.
                    type: string
                type: object
              cardId:
                description: CardId is the SHA-256 hash of the card content for drift
                  detection.
                type: string
              conditions:
                description: Conditions represent the current state of the indexing
                  process
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              expectedSpiffeID:
                description: ExpectedSpiffeID is the SPIFFE ID used for binding evaluation.
                type: string
              lastSyncTime:
                description: LastSyncTime is when the agent card was last successfully
                  fetched
                format: date-time
                type: string
              protocol:
                description: Protocol is the detected agent protocol (e.g., "a2a")
                type: string
              signatureIdentityMatch:
                description: SignatureIdentityMatch is true when both signature and
                  identity binding pass.
                type: boolean
              signatureKeyId:
                description: SignatureKeyID is the key ID used for verification (from
                  JWS protected header kid)
                type: string
              signatureSpiffeId:
                description: SignatureSpiffeID is the SPIFFE ID from the leaf certificate
                  SAN URI (set only when valid).
                type: string
              signatureVerificationDetails:
                description: SignatureVerificationDetails contains details about the
                  last signature verification
                type: string
              targetRef:
                description: |-
                  TargetRef contains the resolved reference to the backing workload.
                  This is populated after the controller successfully locates the workload.
                properties:
                  apiVersion:
                    description: APIVersion is the API version of the target resource
                      (e.g., "apps/v1")
                    minLength: 1
                    type: string
                  kind:
                    description: Kind is the kind of the target resource (e.g., "Deployment",
                      "StatefulSet")
                    minLength: 1
                    type: string
                  name:
                    minLength: 1
                    type: string
                required:
                - apiVersion
                - kind
                - name
                type: object
              validSignature:
                description: ValidSignature indicates if the agent card signature
                  was validated
                type: boolean
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
