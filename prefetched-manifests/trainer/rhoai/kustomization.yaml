# Labels to add to all resources and selectors.
labels:
- includeSelectors: true
  pairs:
    app.kubernetes.io/component: controller
    app.kubernetes.io/name: trainer

resources:
- ../base/crds
- ../base/manager
- ../base/rbac
- ../base/webhook
# - ../third-party/jobset #uncomment if jobset should be bundled under kubeflow trainer controller manager
- runtimes
- imagestreams
- kubeflow-training-roles.yaml
- monitor.yaml

secretGenerator:
  - name: kubeflow-trainer-webhook-cert
    options:
      disableNameSuffixHash: true

patches:
# Mount the controller config file for loading manager configurations
# through a ComponentConfig type
- path: manager_config_patch.yaml
- path: manager_metrics_patch.yaml
# RHAI-specific RBAC for progression tracking
- path: rbac_progression_patch.yaml
  target:
    group: rbac.authorization.k8s.io
    version: v1
    kind: ClusterRole
    name: kubeflow-trainer-controller-manager
- patch: |-
    - op: remove
      path: /spec/ports/0
  target:
    group: ""
    version: v1
    kind: Service
    name: kubeflow-trainer-controller-manager
