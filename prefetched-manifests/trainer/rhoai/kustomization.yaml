    name: rhoai-config
    version: v1
    fieldPath: data.odh-training-universal-workbench-image-cpu-3-4
  targets:
  - select:
      group: image.openshift.io
      kind: ImageStream
      name: training-hub-universal-cpu
      version: v1
    fieldPaths:
    - spec.tags.0.from.name

# Replace image for training-hub-universal-cuda ImageStream (2026.1)
