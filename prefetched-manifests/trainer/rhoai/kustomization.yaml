# RHOAI configuration for Kubeflow Training Operator (KFTO)

# Adds namespace to all resources.
namespace: opendatahub

sortOptions:
  order: legacy

configMapGenerator:
- name: rhoai-config
  envs:
    - params.env

configurations:
- params.yaml

replacements:
# Replace controller image
- source:
    kind: ConfigMap
    name: rhoai-config
    version: v1
    fieldPath: data.odh-kubeflow-trainer-controller-image
  targets:
  - select:
      kind: Deployment
      name: kubeflow-trainer-controller-manager
    fieldPaths:
    - spec.template.spec.containers.0.image

# Replace image for torch-distributed-rocm (floating ROCm - universal)
- source:
    kind: ConfigMap
    name: rhoai-config
    version: v1
    fieldPath: data.odh-th06-rocm64-torch291-py312-image
  targets:
  - select:
      kind: ClusterTrainingRuntime
      name: torch-distributed-rocm
    fieldPaths:
    - spec.template.spec.replicatedJobs.[name=node].template.spec.template.spec.containers.[name=node].image

# Replace image for torch-distributed-rocm64-torch29-py312
- source:
    kind: ConfigMap
    name: rhoai-config
    version: v1
    fieldPath: data.odh-training-rocm64-torch29-py312-image
