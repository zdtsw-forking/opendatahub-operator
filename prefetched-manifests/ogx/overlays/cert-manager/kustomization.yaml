apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Overlay for vanilla Kubernetes clusters using cert-manager for webhook TLS.
# Adds cert-manager Issuer/Certificate resources and wires CA injection into
# the ValidatingWebhookConfiguration and CRD annotations.

resources:
- ../../default
- ../../certmanager

patches:
# Inject cert-manager CA bundle annotation on the CRD.
- path: cainjection_in_ogxservers.yaml
# Inject cert-manager CA bundle annotation on the webhook configuration.
- target:
    kind: ValidatingWebhookConfiguration
  patch: |-
    - op: add
      path: /metadata/annotations
      value:
        cert-manager.io/inject-ca-from: CERTIFICATE_NAMESPACE/CERTIFICATE_NAME

# Replacements wire the webhook Service name/namespace into the Certificate
# dnsNames and the Certificate namespace/name into CA injection annotations.
replacements:
- source:
    kind: Service
    version: v1
    name: webhook-service
    fieldPath: metadata.name
  targets:
  - select:
      kind: Certificate
      group: cert-manager.io
    fieldPaths:
    - spec.dnsNames.0
    - spec.dnsNames.1
    options:
      delimiter: "."
      index: 0
- source:
    kind: Service
    version: v1
    name: webhook-service
    fieldPath: metadata.namespace
  targets:
  - select:
      kind: Certificate
      group: cert-manager.io
    fieldPaths:
    - spec.dnsNames.0
    - spec.dnsNames.1
    options:
      delimiter: "."
      index: 1
- source:
    kind: Certificate
    group: cert-manager.io
    version: v1
    name: serving-cert
    fieldPath: metadata.namespace
  targets:
  - select:
      kind: CustomResourceDefinition
    fieldPaths:
    - metadata.annotations.[cert-manager.io/inject-ca-from]
    options:
      delimiter: "/"
      index: 0
  - select:
      kind: ValidatingWebhookConfiguration
    fieldPaths:
    - metadata.annotations.[cert-manager.io/inject-ca-from]
    options:
      delimiter: "/"
      index: 0
- source:
    kind: Certificate
    group: cert-manager.io
    version: v1
    name: serving-cert
    fieldPath: metadata.name
  targets:
  - select:
      kind: CustomResourceDefinition
    fieldPaths:
    - metadata.annotations.[cert-manager.io/inject-ca-from]
    options:
      delimiter: "/"
      index: 1
  - select:
      kind: ValidatingWebhookConfiguration
    fieldPaths:
    - metadata.annotations.[cert-manager.io/inject-ca-from]
    options:
      delimiter: "/"
      index: 1
