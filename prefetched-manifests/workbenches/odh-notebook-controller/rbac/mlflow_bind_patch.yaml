# Grants the controller SA the 'bind' verb on the 'mlflow-integration' ClusterRole.
# This allows the controller to create RoleBindings referencing the mlflow-integration
# ClusterRole without needing to hold all permissions that role grants.
# Applied as a kustomize patch so it survives 'make manifests' regeneration.
- op: add
  path: /rules/-
  value:
    apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterroles"]
    verbs: ["bind"]
    resourceNames: ["mlflow-operator-mlflow-integration"]
