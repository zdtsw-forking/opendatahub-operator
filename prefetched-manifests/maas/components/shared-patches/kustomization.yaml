apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

# =============================================================================
# SHARED PATCHES COMPONENT
# =============================================================================
# Provides common configuration for MaaS deployment overlays (ODH operator,
# Tenant reconciler). Centralizes patches and replacements to eliminate duplication
# and maintain DRY principle.
#
# USED BY:
# - maas-api/deploy/overlays/odh/       (Tenant reconciler overlay)
#
# PROVIDES:
# - Environment variables for maas-api deployment
#   (maas-parameters ConfigMap is generated by the overlay; see overlays/odh/params.env)
# - Image replacements for maas-api and maas-controller
# - Gateway configuration replacements
# - AuthPolicy URL placeholder replacement (placehold → actual namespace)
# =============================================================================

# =============================================================================
# PATCHES - Environment Variables
# =============================================================================
# Inject ConfigMap-based environment variables into the maas-api deployment.
# These variables are used by maas-api to discover gateway configuration.
# =============================================================================

patches:
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: maas-api
    spec:
      template:
        spec:
          containers:
          - name: maas-api
            env:
            - name: GATEWAY_NAMESPACE
              valueFrom:
                configMapKeyRef:
                  key: gateway-namespace
                  name: maas-parameters
            - name: GATEWAY_NAME
              valueFrom:
                configMapKeyRef:
                  key: gateway-name
                  name: maas-parameters
            - name: API_KEY_MAX_EXPIRATION_DAYS
              valueFrom:
                configMapKeyRef:
                  key: api-key-max-expiration-days
                  name: maas-parameters
                  optional: true
  target:
    kind: Deployment
    name: maas-api

# =============================================================================
# REPLACEMENTS - Common Transformations
# =============================================================================
# These replacements apply to all overlays and handle:
# 1. Container images (allows custom images for PR testing)
# 2. Gateway configuration (namespace and name)
# 3. AuthPolicy URL placeholder fix (critical for API key validation)
#
# All values come from the maas-parameters ConfigMap (generated from params.env)
# =============================================================================

replacements:
# -----------------------------------------------------------------------------
# 1. CONTAINER IMAGES
# -----------------------------------------------------------------------------
# Replace maas-api image from params.env (supports custom PR images)
- source:
    kind: ConfigMap
    version: v1
    name: maas-parameters
    fieldPath: data.maas-api-image
  targets:
  - select:
      kind: Deployment
      name: maas-api
    fieldPaths:
    - spec.template.spec.containers.[name=maas-api].image

# Replace maas-controller image from params.env (supports custom PR images)
- source:
    kind: ConfigMap
    version: v1
    name: maas-parameters
    fieldPath: data.maas-controller-image
  targets:
  - select:
      kind: Deployment
      name: maas-controller
    fieldPaths:
    - spec.template.spec.containers.[name=manager].image

# Replace API key cleanup CronJob image from params.env (ubi-minimal for curl).
# Enables the operator to override the image with a pinned SHA digest for
# disconnected environments via RELATED_IMAGE_UBI_MINIMAL_IMAGE.
- source:
    kind: ConfigMap
    version: v1
    name: maas-parameters
    fieldPath: data.maas-api-key-cleanup-image
  targets:
  - select:
      kind: CronJob
      name: maas-api-key-cleanup
    fieldPaths:
    - spec.jobTemplate.spec.template.spec.containers.[name=cleanup].image

# -----------------------------------------------------------------------------
# 2. GATEWAY CONFIGURATION
# -----------------------------------------------------------------------------
# Replace gateway namespace in HTTPRoute (typically openshift-ingress)
- source:
    kind: ConfigMap
    version: v1
    name: maas-parameters
    fieldPath: data.gateway-namespace
  targets:
  - select:
      kind: HTTPRoute
      name: maas-api-route
    fieldPaths:
    - spec.parentRefs.0.namespace

# Replace gateway name in HTTPRoute (typically maas-default-gateway)
- source:
    kind: ConfigMap
    version: v1
    name: maas-parameters
    fieldPath: data.gateway-name
  targets:
  - select:
      kind: HTTPRoute
      name: maas-api-route
    fieldPaths:
    - spec.parentRefs.0.name

# -----------------------------------------------------------------------------
# 3. AUTHPOLICY URL PLACEHOLDER FIX
# -----------------------------------------------------------------------------
# CRITICAL: Replaces placeholder namespace in AuthPolicy validation URL
# From: https://maas-api.placehold.svc.cluster.local:8443/internal/v1/api-keys/validate
# To:   https://maas-api.<app-namespace>.svc.cluster.local:8443/internal/v1/api-keys/validate
#
# Without this replacement, API key validation fails with DNS resolution errors.
# -----------------------------------------------------------------------------
- source:
    kind: ConfigMap
    version: v1
    name: maas-parameters
    fieldPath: data.app-namespace
  targets:
  - select:
      kind: AuthPolicy
      name: maas-api-auth-policy
    fieldPaths:
    - spec.rules.metadata.apiKeyValidation.http.url
    options:
      delimiter: "."
      index: 1

# -----------------------------------------------------------------------------
# 3b. DESTINATIONRULE HOST FIX (TLS overlay)
# -----------------------------------------------------------------------------
# When the TLS overlay is used, a DestinationRule is created with placeholder
# host: maas-api.maas-api.svc → maas-api.<app-namespace>.svc
# NOTE: DestinationRule namespace must be fixed by each overlay directly
# (not here) because the overlay's `namespace:` directive overrides component
# replacements. See maas-api/deploy/overlays/odh for the pattern.
# -----------------------------------------------------------------------------
- source:
    kind: ConfigMap
    version: v1
    name: maas-parameters
    fieldPath: data.app-namespace
  targets:
  - select:
      kind: DestinationRule
      name: maas-api-backend-tls
    fieldPaths:
    - spec.host
    options:
      delimiter: "."
      index: 1

# -----------------------------------------------------------------------------
# 4. CLUSTER AUDIENCE FOR KUBERNETESTOKENREVIEW
# -----------------------------------------------------------------------------
# Sets the correct audience for kubernetesTokenReview authentication.
# Clusters with custom OIDC issuers (e.g., HyperShift, ROSA) use a different
# audience than the default https://kubernetes.default.svc. The operator
# detects this from Authentication/cluster and sets the param accordingly.
# -----------------------------------------------------------------------------
- source:
    kind: ConfigMap
    version: v1
    name: maas-parameters
    fieldPath: data.cluster-audience
  targets:
  - select:
      kind: AuthPolicy
      name: maas-api-auth-policy
    fieldPaths:
    - spec.rules.authentication.openshift-identities.kubernetesTokenReview.audiences.0
