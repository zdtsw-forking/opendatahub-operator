apiVersion: perses.dev/v1alpha1
kind: PersesDashboard
metadata:
  name: dashboard-3-maas-usage-admin
  namespace: opendatahub
spec:
  display:
    description: Token consumption overview and per-user usage breakdown
    name: Usage
  duration: 168h
  layouts:
    - kind: Grid
      spec:
        display:
          collapse:
            open: true
          title: Overview
        items:
          - content:
              $ref: '#/spec/panels/totalTokens'
            height: 5
            width: 5
            x: 0
            'y': 0
          - content:
              $ref: '#/spec/panels/totalRequests'
            height: 5
            width: 5
            x: 5
            'y': 0
          - content:
              $ref: '#/spec/panels/totalErrors'
            height: 5
            width: 5
            x: 10
            'y': 0
          - content:
              $ref: '#/spec/panels/successRate'
            height: 5
            width: 5
            x: 15
            'y': 0
          - content:
              $ref: '#/spec/panels/activeUsers'
            height: 5
            width: 4
            x: 20
            'y': 0
    - kind: Grid
      spec:
        display:
          collapse:
            open: true
          title: Token Consumption
        items:
          - content:
              $ref: '#/spec/panels/tokenConsumptionByUser'
            height: 12
            width: 24
            x: 0
            'y': 0
  panels:
    activeUsers:
      kind: Panel
      spec:
        display:
          description: Distinct users with API activity over the selected time window.
          name: Active Users
        plugin:
          kind: StatChart
          spec:
            calculation: last
            format:
              unit: decimal
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: kuadrant-prometheus-datasource
                  query: |-
                    count(
                      count by (user) (
                        (
                          (
                            sum by (user, subscription, limitador_namespace) (
                              increase(authorized_calls{user!="", user=~"$user", subscription=~"$subscription"}[$__range])
                            )
                            +
                            sum by (user, subscription, limitador_namespace) (
                              increase(limited_calls{user!="", user=~"$user", subscription=~"$subscription"}[$__range])
                            )
                          )
                          or
                          sum by (user, subscription, limitador_namespace) (
                            increase(authorized_calls{user!="", user=~"$user", subscription=~"$subscription"}[$__range])
                          )
                        )
                        * on(user, subscription, limitador_namespace)
                        (0 * max by (user, subscription, limitador_namespace) (max_over_time(authorized_hits{model=~"$model"}[$__range])) + 1)
                        > 0
                      )
                    ) or vector(0)
                  seriesNameFormat: Users
    successRate:
      kind: Panel
      spec:
        display:
          description: Percentage of authorized vs total requests over the selected time window.
          name: Success Rate
        plugin:
          kind: StatChart
          spec:
            calculation: last
            format:
              decimalPlaces: 0
              unit: percent-decimal
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: kuadrant-prometheus-datasource
                  query: |-
                    (
                      (
                        sum(
                          sum by (user, subscription, limitador_namespace) (
                            increase(authorized_calls{user!="", user=~"$user", subscription=~"$subscription"}[$__range])
                          )
                          * on(user, subscription, limitador_namespace)
                          (0 * max by (user, subscription, limitador_namespace) (max_over_time(authorized_hits{model=~"$model"}[$__range])) + 1)
                        )
                      )
                      /
                      (
                        (
                          sum(
                            sum by (user, subscription, limitador_namespace) (
                              increase(authorized_calls{user!="", user=~"$user", subscription=~"$subscription"}[$__range])
                            )
                            * on(user, subscription, limitador_namespace)
                            (0 * max by (user, subscription, limitador_namespace) (max_over_time(authorized_hits{model=~"$model"}[$__range])) + 1)
                          )
                          +
                          (
                            sum(
                              sum by (user, subscription, limitador_namespace) (
                                increase(limited_calls{user!="", user=~"$user", subscription=~"$subscription"}[$__range])
                              )
                              * on(user, subscription, limitador_namespace)
                              (0 * max by (user, subscription, limitador_namespace) (max_over_time(authorized_hits{model=~"$model"}[$__range])) + 1)
                            )
                            or vector(0)
                          )
                        ) > 0
                      )
                    ) or vector(1)
                  seriesNameFormat: Success Rate
    tokenConsumptionByUser:
      kind: Panel
      spec:
        display:
          description: Per-user totals over the Range dropdown window.
          name: Token Consumption
        plugin:
          kind: Table
          spec:
            columnSettings:
              - hide: true
                name: timestamp
              - align: left
                enableSorting: true
                header: User
                name: user
              - align: left
                enableSorting: true
                header: Subscription
                name: subscription
              - align: left
                enableSorting: true
                header: Model
                name: model
              - align: right
                enableSorting: true
                format:
                  shortValues: true
                  unit: decimal
                  decimalPlaces: 0
                header: Tokens
                name: 'value #1'
                sort: desc
              - align: right
                enableSorting: true
                format:
                  decimalPlaces: 0
                  unit: decimal
                header: Requests
                name: 'value #2'
              - align: right
                enableSorting: true
                format:
                  decimalPlaces: 0
                  unit: decimal
                header: Rate Limited
                name: 'value #3'
            density: compact
            pagination: true
            transforms:
              - kind: MergeSeries
                spec: {}
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: kuadrant-prometheus-datasource
                  query: 'round(sum by (user, subscription, model) (increase(authorized_hits{user!="", user=~"$user", subscription=~"$subscription", model=~"$model"}[$__range])))'
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: kuadrant-prometheus-datasource
                  query: |-
                    round(
                      sum by (user, subscription, model) (
                        (
                          (
                            sum by (user, subscription, limitador_namespace) (increase(authorized_calls{user!="", user=~"$user", subscription=~"$subscription"}[$__range]))
                            +
                            sum by (user, subscription, limitador_namespace) (increase(limited_calls{user!="", user=~"$user", subscription=~"$subscription"}[$__range]))
                          )
                          or
                          sum by (user, subscription, limitador_namespace) (increase(authorized_calls{user!="", user=~"$user", subscription=~"$subscription"}[$__range]))
                        )
                        * on(user, subscription, limitador_namespace) group_left(model)
                        (0 * max by (user, subscription, limitador_namespace, model) (max_over_time(authorized_hits{model=~"$model"}[$__range])) + 1)
                      )
                      or
                      0 * sum by (user, subscription, model) (increase(authorized_hits{user!="", user=~"$user", subscription=~"$subscription", model=~"$model"}[$__range]))
                    )
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: kuadrant-prometheus-datasource
                  query: |-
                    round(
                      sum by (user, subscription, model) (
                        sum by (user, subscription, limitador_namespace) (increase(limited_calls{user!="", user=~"$user", subscription=~"$subscription"}[$__range]))
                        * on(user, subscription, limitador_namespace) group_left(model)
                        (0 * max by (user, subscription, limitador_namespace, model) (max_over_time(authorized_hits{model=~"$model"}[$__range])) + 1)
                      )
                      or
                      0 * sum by (user, subscription, model) (increase(authorized_hits{user!="", user=~"$user", subscription=~"$subscription", model=~"$model"}[$__range]))
                    )
    totalErrors:
      kind: Panel
      spec:
        display:
          description: Total rate-limited requests over the selected time window.
          name: Total Errors
        plugin:
          kind: StatChart
          spec:
            calculation: last
            format:
              decimalPlaces: 0
              shortValues: true
              unit: decimal
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: kuadrant-prometheus-datasource
                  query: |-
                    sum(
                      sum by (user, subscription, limitador_namespace) (
                        increase(limited_calls{user!="", user=~"$user", subscription=~"$subscription"}[$__range])
                      )
                      * on(user, subscription, limitador_namespace)
                      (0 * max by (user, subscription, limitador_namespace) (max_over_time(authorized_hits{model=~"$model"}[$__range])) + 1)
                    )
                    or vector(0)
                  seriesNameFormat: Errors
    totalRequests:
      kind: Panel
      spec:
        display:
          description: Total API requests (authorized + rate-limited) over the selected time window.
          name: Total Requests
        plugin:
          kind: StatChart
          spec:
            calculation: last
            format:
              decimalPlaces: 0
              shortValues: true
              unit: decimal
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: kuadrant-prometheus-datasource
                  query: |-
                    (
                      sum(
                        sum by (user, subscription, limitador_namespace) (
                          increase(authorized_calls{user!="", user=~"$user", subscription=~"$subscription"}[$__range])
                        )
                        * on(user, subscription, limitador_namespace)
                        (0 * max by (user, subscription, limitador_namespace) (max_over_time(authorized_hits{model=~"$model"}[$__range])) + 1)
                      )
                      or vector(0)
                    )
                    +
                    (
                      sum(
                        sum by (user, subscription, limitador_namespace) (
                          increase(limited_calls{user!="", user=~"$user", subscription=~"$subscription"}[$__range])
                        )
                        * on(user, subscription, limitador_namespace)
                        (0 * max by (user, subscription, limitador_namespace) (max_over_time(authorized_hits{model=~"$model"}[$__range])) + 1)
                      )
                      or vector(0)
                    )
                  seriesNameFormat: Requests
    totalTokens:
      kind: Panel
      spec:
        display:
          description: Total tokens consumed over the selected time window.
          name: Total Tokens
        plugin:
          kind: StatChart
          spec:
            calculation: last
            format:
              decimalPlaces: 0
              shortValues: true
              unit: decimal
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: kuadrant-prometheus-datasource
                  query: 'sum(increase(authorized_hits{user!="", user=~"$user", subscription=~"$subscription", model=~"$model"}[$__range])) or vector(0)'
                  seriesNameFormat: Tokens
  variables:
    - kind: ListVariable
      spec:
        allowAllValue: true
        allowMultiple: true
        defaultValue: $__all
        display:
          name: User
        name: user
        plugin:
          kind: PrometheusLabelValuesVariable
          spec:
            datasource:
              kind: PrometheusDatasource
              name: kuadrant-prometheus-datasource
            labelName: user
            matchers:
              - 'authorized_hits{user!=""}'
    - kind: ListVariable
      spec:
        allowAllValue: true
        allowMultiple: true
        defaultValue: $__all
        display:
          name: Subscription
        name: subscription
        plugin:
          kind: PrometheusLabelValuesVariable
          spec:
            datasource:
              kind: PrometheusDatasource
              name: kuadrant-prometheus-datasource
            labelName: subscription
            matchers:
              - 'authorized_hits{subscription!=""}'
    - kind: ListVariable
      spec:
        allowAllValue: true
        allowMultiple: true
        defaultValue: $__all
        display:
          name: Model
        name: model
        plugin:
          kind: PrometheusLabelValuesVariable
          spec:
            datasource:
              kind: PrometheusDatasource
              name: kuadrant-prometheus-datasource
            labelName: model
            matchers:
              - 'authorized_hits{model!=""}'
