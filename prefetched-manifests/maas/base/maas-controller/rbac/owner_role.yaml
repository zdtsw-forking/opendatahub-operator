---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: maas-owner-role
  labels:
    rbac.authorization.k8s.io/aggregate-to-admin: "true"
    rbac.authorization.k8s.io/aggregate-to-edit: "true"
rules:
- apiGroups:
  - maas.opendatahub.io
  resources:
  - maasmodelrefs
  - externalmodels
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
