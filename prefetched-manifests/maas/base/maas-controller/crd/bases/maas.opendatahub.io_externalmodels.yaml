---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.4
  name: externalmodels.maas.opendatahub.io
spec:
  group: maas.opendatahub.io
  names:
    kind: ExternalModel
    listKind: ExternalModelList
    plural: externalmodels
    singular: externalmodel
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.provider
      name: Provider
      type: string
    - jsonPath: .spec.targetModel
      name: TargetModel
      type: string
    - jsonPath: .spec.endpoint
      name: Endpoint
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ExternalModel is the Schema for the externalmodels API.
          It defines an external LLM provider (e.g., OpenAI, Anthropic) that can be
          referenced by MaaSModelRef resources.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ExternalModelSpec defines the desired state of ExternalModel
            properties:
              credentialRef:
                description: |-
                  CredentialRef references a Kubernetes Secret containing the provider API key.
                  The Secret must contain a data key "api-key" with the credential value.
                properties:
                  name:
                    description: Name is the name of the Secret
                    maxLength: 253
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              endpoint:
                description: |-
                  Endpoint is the FQDN of the external provider (no scheme or path).
                  e.g. "api.openai.com".
                  This field is metadata for downstream consumers (e.g. BBR provider-resolver plugin)
                  and is not used by the controller for endpoint derivation.
                maxLength: 253
                minLength: 1
                pattern: ^[a-zA-Z0-9]([a-zA-Z0-9\-]*[a-zA-Z0-9])?(\.[a-zA-Z0-9]([a-zA-Z0-9\-]*[a-zA-Z0-9])?)*$
                type: string
              provider:
                description: Provider identifies the API format and auth type for
                  the external model.
                maxLength: 63
                minLength: 1
                type: string
              targetModel:
                description: |-
                  TargetModel is the upstream model name at the external provider.
                  e.g. "gpt-4o", "claude-sonnet-4-5-20241022".
                maxLength: 253
                minLength: 1
                type: string
            required:
            - credentialRef
            - endpoint
            - provider
            - targetModel
            type: object
          status:
            description: ExternalModelStatus defines the observed state of ExternalModel
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of the external model's state
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              phase:
                description: Phase represents the current phase of the external model
                enum:
                - Pending
                - Ready
                - Failed
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
