# NetworkPolicy to allow Gateway pods to communicate with MaaS API
# for HTTP routing and load balancing to backend services.
#
# Security constraints:
# - podSelector: Restricted to maas-api pods only (not all namespace pods)
# - from: Only Gateway pods in openshift-ingress namespace
#
# Background:
# - ODH creates a default NetworkPolicy that blocks ingress from unlabeled namespaces
# - openshift-ingress namespace doesn't have ODH labels
# - This policy adds an exception for Gateway pods to reach MaaS API on port 8443
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: maas-api-allow-gateway
  labels:
    app.opendatahub.io/modelsasservice: "true"
    app.kubernetes.io/part-of: maas
    app.kubernetes.io/component: networking
spec:
  # Apply only to maas-api pods (label added via Kustomize labels transformer)
  podSelector:
    matchLabels:
      app.kubernetes.io/name: maas-api
  policyTypes:
    - Ingress
  ingress:
    # Allow traffic from Gateway pods in openshift-ingress
    # Restricts to router component pods only for security
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-ingress
          podSelector:
            matchLabels:
              app.kubernetes.io/component: router
      ports:
        - protocol: TCP
          port: 8443
