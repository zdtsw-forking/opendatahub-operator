apiVersion: batch/v1
kind: CronJob
metadata:
  name: maas-api-key-cleanup
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 60
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: maas-api-cleanup
        spec:
          serviceAccountName: maas-api
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
          containers:
          - name: cleanup
            image: registry.redhat.io/ubi9/ubi-minimal:9.7
            command:
            - /bin/sh
            - -c
            - |
              curl -sf -X POST http://maas-api:8080/internal/v1/api-keys/cleanup
            resources:
              requests:
                memory: "16Mi"
                cpu: "10m"
              limits:
                memory: "32Mi"
                cpu: "50m"
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                - ALL
              readOnlyRootFilesystem: true
              runAsNonRoot: true
