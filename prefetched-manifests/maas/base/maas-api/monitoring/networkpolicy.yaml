apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: maas-api-allow-monitoring
  labels:
    app.opendatahub.io/modelsasservice: "true"
    app.kubernetes.io/part-of: maas
    app.kubernetes.io/component: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: maas-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: redhat-ods-monitoring
      ports:
        - protocol: TCP
          port: 9090
