# Supplemental ClusterRole for maas-api.
#
# The ODH operator reconciles the main "maas-api" ClusterRole and may strip
# rules that are added via kustomize overlays or the deploy script. This
# supplemental role is NOT managed by the operator, so its rules persist
# across reconciliation cycles.
#
# Rules here should mirror any permissions that maas-api needs at runtime
# but that the operator's bundled manifests may not yet include.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: maas-api-supplemental
rules:
# Database configuration secret
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["maas-db-config"]
  verbs: ["get"]

# Subject access review for admin authorization (SAR-based admin check)
- apiGroups: ["authorization.k8s.io"]
  resources: ["subjectaccessreviews"]
  verbs: ["create"]

# MaaS CRs for the models endpoint and subscription selector
- apiGroups: ["maas.opendatahub.io"]
  resources: ["maasmodelrefs", "maassubscriptions"]
  verbs: ["get", "list", "watch"]
