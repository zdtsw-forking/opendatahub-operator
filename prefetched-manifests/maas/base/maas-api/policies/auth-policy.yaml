apiVersion: kuadrant.io/v1
kind: AuthPolicy
metadata:
  name: maas-api-auth-policy
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: maas-api-route
  # Skip auth for the health endpoint so unauthenticated readiness probes
  # (e.g. the e2e gateway reachability check) get a 200 instead of 401.
  # Auth is evaluated before URLRewrite, so the path is still /maas-api/health.
  when:
    - predicate: 'request.path != "/maas-api/health" || request.method != "GET"'
  rules:
    authentication:
      # API key authentication (for sk-oai-* tokens)
      api-keys:
        when:
          - selector: request.headers.authorization
            operator: matches
            value: "^Bearer sk-oai-.*"
        plain:
          selector: request.headers.authorization
        priority: 0
      # OpenShift token authentication (fallback for non-API-key tokens)
      openshift-identities:
        when:
          - predicate: '!request.headers.authorization.startsWith("Bearer sk-oai-")'
        kubernetesTokenReview:
          audiences:
            - https://kubernetes.default.svc
            - maas-default-gateway-sa
        priority: 1
    metadata:
      # Validate API key via HTTP callback (only runs for API key auth)
      apiKeyValidation:
        when:
          - selector: request.headers.authorization
            operator: matches
            value: "^Bearer sk-oai-.*"
        http:
          # Placeholder URL - gets patched via kustomize replacements (app-namespace param)
          # All overlays use shared-patches component for consistent replacements
          url: https://maas-api.placehold.svc.cluster.local:8443/internal/v1/api-keys/validate
          method: POST
          contentType: application/json
          body:
            expression: '{"key": request.headers.authorization.replace("Bearer ", "")}'
        priority: 0
    authorization:
      # Check API key is valid (only for API key auth)
      api-key-valid:
        when:
          - selector: request.headers.authorization
            operator: matches
            value: "^Bearer sk-oai-.*"
        patternMatching:
          patterns:
            - selector: auth.metadata.apiKeyValidation.valid
              operator: eq
              value: "true"
        priority: 0
    response:
      success:
        headers:
          # Username: from API key validation (when API key used)
          X-MaaS-Username:
            when:
              - selector: request.headers.authorization
                operator: matches
                value: "^Bearer sk-oai-.*"
            plain:
              selector: auth.metadata.apiKeyValidation.username
            priority: 0
          # Username: from OpenShift identity (fallback for non-API-key tokens)
          X-MaaS-Username-OC:
            when:
              - predicate: '!request.headers.authorization.startsWith("Bearer sk-oai-")'
            plain:
              selector: auth.identity.user.username
            key: X-MaaS-Username
            priority: 1
          # Groups: from API key validation as JSON array (when API key used)
          X-MaaS-Group:
            when:
              - selector: request.headers.authorization
                operator: matches
                value: "^Bearer sk-oai-.*"
            plain:
              selector: auth.metadata.apiKeyValidation.groups.@tostr
            priority: 0
          # Groups: from OpenShift identity as JSON array (fallback for non-API-key tokens)
          X-MaaS-Group-OC:
            when:
              - predicate: '!request.headers.authorization.startsWith("Bearer sk-oai-")'
            plain:
              selector: auth.identity.user.groups.@tostr
            key: X-MaaS-Group
            priority: 1
          # Subscription: from API key validation (when API key with subscription used)
          # This header is used by /v1/models to determine which subscription's models to return
          X-MaaS-Subscription:
            when:
              - selector: request.headers.authorization
                operator: matches
                value: "^Bearer sk-oai-.*"
              - selector: auth.metadata.apiKeyValidation.subscription
                operator: neq
                value: ""
            plain:
              selector: auth.metadata.apiKeyValidation.subscription
            priority: 0
