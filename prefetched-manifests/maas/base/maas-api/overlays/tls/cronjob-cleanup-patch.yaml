# CronJob base uses http://maas-api:8080; TLS overlay exposes HTTPS on 8443 only.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: maas-api-key-cleanup
spec:
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: cleanup
            command:
            - /bin/sh
            - -c
            - |
              curl -sf -k -X POST https://maas-api:8443/internal/v1/api-keys/cleanup
