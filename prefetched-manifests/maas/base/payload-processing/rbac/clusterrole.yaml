apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: payload-processing-reader
rules:
  # bbr-configmap-reader: upstream BBR framework needs configmap access
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  # apikey-injection plugin: controller-runtime informer cache requires list+watch
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  # model-provider-resolver plugin: watches ExternalModel CRDs across namespaces
  - apiGroups: ["maas.opendatahub.io"]
    resources: ["externalmodels"]
    verbs: ["get", "list", "watch"]
