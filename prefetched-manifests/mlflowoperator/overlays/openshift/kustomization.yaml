apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Reference the base configuration
resources:
  - ../../base
  # Include Prometheus ServiceMonitor (OpenShift has Prometheus Operator pre-installed)
  - ../../prometheus

# OpenShift-specific patches for secure metrics using service serving certificates
patches:
  - path: metrics_service_patch.yaml
    target:
      kind: Service
      name: controller-manager-metrics-service
  - path: manager_patch.yaml
    target:
      kind: Deployment
      name: controller-manager
  - path: servicemonitor_patch.yaml
    target:
      kind: ServiceMonitor
      name: controller-manager-metrics-monitor

# Kustomize replacements
replacements:
  # Derive serverName in ServiceMonitor from the actual Service name and namespace
  - source:
      kind: Service
      name: controller-manager-metrics-service
      fieldPath: metadata.name
    targets:
      - select:
          kind: ServiceMonitor
          name: controller-manager-metrics-monitor
        fieldPaths:
          - spec.endpoints.0.tlsConfig.serverName
        options:
          delimiter: "."
          index: 0
  - source:
      kind: Service
      name: controller-manager-metrics-service
      fieldPath: metadata.namespace
    targets:
      - select:
          kind: ServiceMonitor
          name: controller-manager-metrics-monitor
        fieldPaths:
          - spec.endpoints.0.tlsConfig.serverName
        options:
          delimiter: "."
          index: 1

  # Replace controller-manager image for production deployments
  - source:
      kind: ConfigMap
      name: operator-params
      fieldPath: data.MLFLOW_OPERATOR_IMAGE
    targets:
      - select:
          kind: Deployment
          name: controller-manager
        fieldPaths:
          - spec.template.spec.containers.[name=manager].image

  # Replace gateway-name in HTTPRoute
  - source:
      kind: ConfigMap
      name: operator-params
      fieldPath: data.gateway-name
    targets:
      - select:
          kind: HTTPRoute
          name: mlflow
        fieldPaths:
          - spec.parentRefs.0.name

  # Replace mlflow-url in ConsoleLink
  - source:
      kind: ConfigMap
      name: operator-params
      fieldPath: data.mlflow-url
    targets:
      - select:
          kind: ConsoleLink
          name: mlflowlink
        fieldPaths:
          - spec.href
