apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Chain: base → openshift (RHEL image env vars + paths) → openshift-tls (TLS + SCC fixes)
resources:
  - ../openshift

components:
  - ../components/tls

patches:
  - path: secctx-patch.yaml
    target:
      kind: Deployment
      name: postgres-deployment
  - path: tls-key-mode-patch.yaml
    target:
      kind: Deployment
      name: postgres-deployment
