---
# Aggregate role for viewing MLflow resources.
# Excludes gateway secrets, aligning with how Kubernetes "view" excludes Secrets.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mlflow-view
  labels:
    rbac.authorization.k8s.io/aggregate-to-view: "true"
    rbac.authorization.k8s.io/aggregate-to-edit: "true"
    rbac.authorization.k8s.io/aggregate-to-admin: "true"
rules:
  - apiGroups:
      - mlflow.opendatahub.io
    resources:
      - mlflows
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - mlflow.kubeflow.org
    resources:
      - mlflowconfigs
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - mlflow.opendatahub.io
    resources:
      - mlflows/status
    verbs:
      - get
      - list
      - watch
  # Pseudo-resources used by the MLflow Kubernetes authorization plugin for
  # SelfSubjectAccessReview checks; not actual CRDs.
  - apiGroups:
      - mlflow.kubeflow.org
    resources:
      - datasets
      - experiments
      - registeredmodels
      - gatewayendpoints
      - gatewaymodeldefinitions
    verbs:
      - get
      - list
---
# Aggregate role for editing MLflow resources.
# Grants full CRUD on all MLflow resources including the cluster-scoped
# operator CR, gateway invocation via /use subresources, and mlflowconfigs
# management.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mlflow-edit
  labels:
    rbac.authorization.k8s.io/aggregate-to-edit: "true"
    rbac.authorization.k8s.io/aggregate-to-admin: "true"
rules:
  - apiGroups:
      - mlflow.opendatahub.io
    resources:
      - mlflows
    verbs:
      - get
      - list
      - watch
      - create
      - delete
      - deletecollection
      - patch
      - update
  # Included so admins can remove stuck finalizers; only effective via
  # ClusterRoleBinding since mlflows is cluster-scoped.
  - apiGroups:
      - mlflow.opendatahub.io
    resources:
      - mlflows/finalizers
    verbs:
      - patch
      - update
  - apiGroups:
      - mlflow.kubeflow.org
    resources:
      - mlflowconfigs
    verbs:
      - create
      - delete
      - deletecollection
      - patch
      - update
  - apiGroups:
      - mlflow.kubeflow.org
    resources:
      - gatewaysecrets
    verbs:
      - get
      - list
  # Pseudo-resources used by the MLflow Kubernetes authorization plugin for
  # SelfSubjectAccessReview checks; not actual CRDs.
  - apiGroups:
      - mlflow.kubeflow.org
    resources:
      - datasets
      - experiments
      - registeredmodels
      - gatewaysecrets
      - gatewayendpoints
      - gatewaymodeldefinitions
    verbs:
      - create
      - update
      - delete
  - apiGroups:
      - mlflow.kubeflow.org
    resources:
      - gatewaysecrets/use
      - gatewayendpoints/use
      - gatewaymodeldefinitions/use
    verbs:
      - create
