apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: redhat-ods-applications

namePrefix: ai-gateway-

resources:
  - ../../base

labels:
  - pairs:
      app.kubernetes.io/part-of: ai-gateway-operator
      # set platform.opendatahub.io/part-of=aigateway as a workaround for 3.5ea2 release
      # so the CR will take all deployment readiness to CR status=>DSC modulestatus will show correct
      platform.opendatahub.io/part-of: aigateway
