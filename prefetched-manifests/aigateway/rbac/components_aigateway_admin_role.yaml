# This rule is not used by the project ai-gateway-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants admin permissions (create, delete, get, list, patch, update, watch) over components.platform.opendatahub.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: ai-gateway-operator
    app.kubernetes.io/managed-by: kustomize
  name: components-aigateway-admin-role
rules:
- apiGroups:
  - components.platform.opendatahub.io
  resources:
  - aigateways
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - components.platform.opendatahub.io
  resources:
  - aigateways/status
  verbs:
  - get
