apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# ODH-facing deploy overlay for the ai-gateway-operator itself (the module
# operator). opendatahub-operator's module handler renders this via kustomize
# (ManifestDir) instead of a Helm chart. It reuses the operator's own
# crd/rbac/manager so it never drifts from `make manifests` output.
resources:
  - ../../../crd
  - ../../../rbac
  - ../../../manager
  - metrics_service.yaml

patches:
  - path: manager_metrics_patch.yaml
    target:
      kind: Deployment

# operator-params holds the operator image. opendatahub-operator substitutes
# AI_GATEWAY_OPERATOR_IMAGE in params.env with the digest-pinned reference at
# deploy time; the replacement below injects it into the Deployment.
configMapGenerator:
  - name: operator-params
    envs:
      - params.env

generatorOptions:
  disableNameSuffixHash: true

replacements:
  - source:
      kind: ConfigMap
      name: operator-params
      fieldPath: data.AI_GATEWAY_OPERATOR_IMAGE
    targets:
      - select:
          kind: Deployment
        fieldPaths:
          - spec.template.spec.containers.[name=manager].image
          - spec.template.spec.initContainers.[name=copy-manifests].image
