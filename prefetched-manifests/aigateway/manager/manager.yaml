apiVersion: apps/v1
kind: Deployment
metadata:
  name: operator
  namespace: system
  labels:

    app.kubernetes.io/name: ai-gateway-operator
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
  
      app.kubernetes.io/name: ai-gateway-operator
  replicas: 1
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
    
        app.kubernetes.io/name: ai-gateway-operator
    spec:
      # TODO(user): Uncomment the following code to configure the nodeAffinity expression
      # according to the platforms which are supported by your solution.
      # It is considered best practice to support multiple architectures. You can
      # build your manager image using the makefile target container-build.
      # affinity:
      #   nodeAffinity:
      #     requiredDuringSchedulingIgnoredDuringExecution:
      #       nodeSelectorTerms:
      #         - matchExpressions:
      #           - key: kubernetes.io/arch
      #             operator: In
      #             values:
      #               - amd64
      #               - arm64
      #               - ppc64le
      #               - s390x
      #           - key: kubernetes.io/os
      #             operator: In
      #             values:
      #               - linux
      securityContext:
        # Projects are configured by default to adhere to the "restricted" Pod Security Standards.
        # This ensures that deployments meet the highest security requirements for Kubernetes.
        # For more details, see: https://kubernetes.io/docs/concepts/security/pod-security-standards/#restricted
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      initContainers:
      - name: copy-manifests
        image: controller:latest
        imagePullPolicy: Always
        command: ["cp", "-r", "/manifests/.", "/opt/manifests/"]
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - "ALL"
        volumeMounts:
        - name: manifests
          mountPath: /opt/manifests
      containers:
      - command:
        - /manager
        - operator
        image: controller:latest
        imagePullPolicy: Always
        name: manager
        ports:
        - containerPort: 8081
          name: health
          protocol: TCP
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - "ALL"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        # TODO(user): Configure the resources accordingly based on the project requirements.
        # More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 10m
            memory: 128Mi
        volumeMounts:
        - name: config
          mountPath: /etc/controller/config
          readOnly: true
        - name: manifests
          mountPath: /opt/manifests
        env:
        - name: GOMEMLIMIT
          value: 410MiB
        - name: ODH_MODULE_OPERATOR_CONFIGURATION_PATH
          value: /etc/controller/config
        - name: ODH_MODULE_OPERATOR_MANIFESTS_PATH
          value: /opt/manifests
        - name: ODH_MODULE_OPERATOR_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: ODH_MODULE_OPERATOR_APPLICATIONS_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        # Duplicated for compatibility with the opendatahub-operator framework
        # which reads RHAI_APPLICATIONS_NAMESPACE via the global viper instance.
        - name: RHAI_APPLICATIONS_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
      volumes:
      - name: manifests
        emptyDir: {}
      - name: config
        configMap:
          name: config
      serviceAccountName: operator
      terminationGracePeriodSeconds: 10
