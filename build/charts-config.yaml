map:
  rhaii-helm-chart:
    git.url: https://github.com/red-hat-data-services/odh-gitops
    git.commit: 030f05060d9a5f7f9b3d5873af3f3fcaa15dc96b
    src: charts/dependencies
    # dest is relative to PREFETCHED_CHARTS_DIR_PATH (prefetched-charts/).
    # The Dockerfile copies prefetched-charts/ contents into /opt/charts/,
    # so dest must be "." to avoid double nesting (/opt/charts/charts/).
    dest: .
    ref_type: branch
